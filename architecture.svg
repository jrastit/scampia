<svg width="100%" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- 1. OpenClaw Agent -->
  <rect x="220" y="30" width="240" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="50" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">OpenClaw agent</text>
  <text x="340" y="70" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">Envoie une intention de trade</text>

  <!-- Arrow 1 -->
  <line x1="340" y1="86" x2="340" y2="130" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="350" y="112" font-size="12" fill="#5F5E5A">1. Trade request</text>

  <!-- 2. Safe Layer container -->
  <rect x="60" y="130" width="560" height="300" rx="20" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="158" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Safe layer (ta brique)</text>

  <!-- Inner: Balance check -->
  <rect x="90" y="180" width="170" height="56" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="175" y="200" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Balance check</text>
  <text x="175" y="220" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">Solde suffisant ?</text>

  <!-- Inner: Zodiac permissions -->
  <rect x="280" y="180" width="170" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="365" y="200" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">Zodiac permissions</text>
  <text x="365" y="220" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">Montant, fréquence</text>

  <!-- Inner: Whitelist -->
  <rect x="470" y="180" width="130" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="535" y="200" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">Whitelist</text>
  <text x="535" y="220" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">Contrats autorisés</text>

  <!-- Arrows between checks -->
  <line x1="260" y1="208" x2="278" y2="208" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="450" y1="208" x2="468" y2="208" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Validation -->
  <line x1="340" y1="236" x2="340" y2="278" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="350" y="264" font-size="12" fill="#5F5E5A">2. Vérifications</text>

  <rect x="220" y="280" width="240" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="340" y="302" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#444441">Validation ou refus</text>

  <!-- If OK arrows -->
  <line x1="340" y1="324" x2="210" y2="348" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="324" x2="485" y2="348" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="140" y="340" font-size="12" fill="#5F5E5A">3. Si OK</text>

  <!-- Safe smart account -->
  <rect x="90" y="350" width="240" height="56" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="210" y="370" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Safe smart account</text>
  <text x="210" y="390" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">Custody des fonds (vault)</text>

  <!-- Transaction builder -->
  <rect x="370" y="350" width="230" height="56" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="485" y="370" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Transaction builder</text>
  <text x="485" y="390" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">Construit le calldata</text>

  <!-- Arrow to Uniswap -->
  <line x1="340" y1="430" x2="340" y2="468" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="350" y="454" font-size="12" fill="#5F5E5A">4. Swap tx</text>

  <!-- Uniswap -->
  <rect x="220" y="470" width="240" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="340" y="490" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#712B13">Uniswap</text>
  <text x="340" y="510" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">Exécution onchain</text>

  <!-- Arrow to Front -->
  <line x1="340" y1="526" x2="340" y2="558" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="350" y="546" font-size="12" fill="#5F5E5A">5. Résultat</text>

  <!-- Front -->
  <rect x="220" y="560" width="240" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="340" y="582" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#444441">Front (leaderboard, historique)</text>

  <!-- Refused path (dashed) -->
  <path d="M220 302 L60 302 L60 560 L218 580" fill="none" stroke="#888780" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="44" y="420" font-size="12" fill="#5F5E5A" text-anchor="middle" transform="rotate(-90, 44, 420)">Refusé → log</text>
</svg>
