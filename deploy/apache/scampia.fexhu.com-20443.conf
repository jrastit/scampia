<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName scampia.fexhu.com
    ServerAlias www.scampia.fexhu.com

    DocumentRoot /var/www/front-scampia

    <Directory /var/www/front-scampia>
        Options FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/scampia.fexhu.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/scampia.fexhu.com/privkey.pem

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "20443"

    # Strip /api prefix when forwarding to FastAPI (root_path handles external prefix)
    ProxyPass /api/ http://127.0.0.1:8000/ retry=0 timeout=60 keepalive=On
    ProxyPassReverse /api/ http://127.0.0.1:8000/

    ErrorLog ${APACHE_LOG_DIR}/scampia.fexhu.com-error.log
    CustomLog ${APACHE_LOG_DIR}/scampia.fexhu.com-access.log combined
</VirtualHost>
</IfModule>
